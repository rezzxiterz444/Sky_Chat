<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SkyTalk</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{
--neon:#aa00ff;
--neon-2:#7c3aed;
--neon-3:#6366f1;
--neon-soft:rgba(170,0,255,0.16);
--neon-border:rgba(190,80,255,0.28);
--bg-0:#060108;
--bg-1:#0d0316;
--bg-2:#160726;
--surface:rgba(255,255,255,0.045);
--surface-2:rgba(255,255,255,0.07);
--text-0:#f3edfb;
--text-1:#cdbfe8;
--text-2:#8a7fa3;
--danger:#ef4444;
--ok:#22c55e;
--gold:#facc15;
--radius-sm:10px;
--radius-md:14px;
--radius-lg:20px;
--radius-pill:999px;
--shadow-neon:0 8px 30px rgba(170,0,255,0.28);
--ease:cubic-bezier(.25,.8,.35,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
font-family:'Inter','Segoe UI',ui-monospace,'Courier New',monospace;
background:var(--bg-0);
background-image:
radial-gradient(circle at 12% 8%, rgba(170,0,255,0.18) 0%, transparent 42%),
radial-gradient(circle at 88% 92%, rgba(99,102,241,0.16) 0%, transparent 45%),
radial-gradient(circle at 90% 10%, rgba(124,58,237,0.12) 0%, transparent 40%);
color:var(--text-0);
display:flex;justify-content:center;align-items:flex-start;
height:100vh;height:100dvh;overflow:hidden;
}
#app{
width:100%;max-width:480px;height:100vh;height:100dvh;
background:linear-gradient(165deg,var(--bg-2),var(--bg-0) 65%);
display:flex;flex-direction:column;overflow:hidden;position:relative;
}
@media (min-width:481px){
#app{border-radius:24px;margin:14px 0;height:94vh;height:94dvh;box-shadow:var(--shadow-neon),0 0 0 1px var(--neon-border);}
}
@media (min-width:820px){
#app{max-width:520px;}
}
.neon-text{color:var(--text-0);text-shadow:0 0 8px rgba(170,0,255,.85),0 0 22px rgba(124,58,237,.45);}
.scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll-y::-webkit-scrollbar{width:3px;}
.scroll-y::-webkit-scrollbar-thumb{background:var(--neon-border);border-radius:4px;}
.screen{display:none;flex-direction:column;height:100%;width:100%;animation:fadeIn .32s var(--ease);}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ---- Logo ---- */
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{flex-shrink:0;filter:drop-shadow(0 0 10px rgba(170,0,255,.65));}
.brand-word{font-size:19px;font-weight:800;letter-spacing:.5px;color:var(--text-0);}
.brand-word b{color:var(--neon);}

/* ---- Header ---- */
.header{background:rgba(255,255,255,.035);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--neon-border);flex-shrink:0;gap:8px;}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn-icon{background:var(--surface);border:1px solid var(--neon-border);color:var(--text-1);cursor:pointer;font-size:11px;padding:8px 12px;border-radius:var(--radius-sm);transition:all .18s var(--ease);font-weight:600;font-family:inherit;white-space:nowrap;}
.btn-icon:hover{background:var(--neon-soft);border-color:var(--neon);color:#fff;}
.btn-icon:active{transform:scale(.95);}
.crown-btn{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#1c0a2e;border:none;padding:8px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(250,204,21,.3);transition:transform .15s;}
.crown-btn:hover{transform:translateY(-1px);}

.content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--neon-border);border-radius:4px;}

.input-area{display:flex;gap:8px;padding:12px;background:rgba(255,255,255,.035);backdrop-filter:blur(18px);border-top:1px solid var(--neon-border);align-items:center;flex-shrink:0;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.input-area input[type="text"]{flex:1;padding:12px 16px;border-radius:var(--radius-pill);border:1px solid var(--neon-border);background:var(--surface);color:#fff;font-size:13.5px;outline:none;font-family:inherit;min-width:0;transition:border .18s,box-shadow .18s;}
.input-area input[type="text"]:focus{border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-soft);}
.input-area input[type="file"]{display:none;}
.btn-attach,.btn-record,.btn-send-round{background:linear-gradient(135deg,var(--neon),var(--neon-3));color:#fff;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 16px rgba(170,0,255,.4);transition:transform .15s var(--ease);}
.btn-attach:hover,.btn-record:hover,.btn-send-round:hover{transform:translateY(-2px) scale(1.04);}
.btn-attach:active,.btn-record:active,.btn-send-round:active{transform:scale(.92);}
.btn-record.recording{background:linear-gradient(135deg,var(--danger),#b91c1c);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55);}50%{box-shadow:0 0 0 13px rgba(239,68,68,0);}}

.reply-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--neon-soft);border-top:1px solid var(--neon-border);font-size:12px;}
.reply-bar .rtxt{flex:1;color:var(--text-1);border-left:3px solid var(--neon);padding-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pin-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:rgba(250,204,21,.09);border-bottom:1px solid rgba(250,204,21,.25);font-size:11px;color:var(--gold);}

.message-wrap{display:flex;flex-direction:column;max-width:78%;animation:msgIn .22s var(--ease);}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.message-wrap.sent-wrap{align-self:flex-end;}
.message-wrap.received-wrap{align-self:flex-start;}
.sender-tag{font-size:10px;color:var(--neon);font-weight:700;margin:0 4px 3px;}
.message{padding:10px 14px;border-radius:18px;font-size:13.5px;line-height:1.5;word-break:break-word;position:relative;cursor:pointer;transition:filter .15s;}
.message:hover{filter:brightness(1.06);}
.message.sent{background:linear-gradient(135deg,var(--neon),var(--neon-3));color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 14px rgba(170,0,255,.3);}
.message.received{background:var(--surface-2);color:var(--text-0);border:1px solid var(--neon-border);border-bottom-left-radius:6px;}
.message .quote{font-size:11px;opacity:.78;border-left:2px solid rgba(255,255,255,.55);padding-left:7px;margin-bottom:6px;}
.message img{max-width:210px;border-radius:12px;cursor:pointer;display:block;}
.message audio{max-width:195px;height:36px;}
.message-time{font-size:9.5px;opacity:.7;margin-top:5px;text-align:right;display:flex;justify-content:flex-end;gap:3px;align-items:center;}
.tick{font-size:11px;}
.tick.read{color:#60a5fa;}
.pinned-flag{font-size:9.5px;color:var(--gold);margin-bottom:3px;}

.poll-box{background:var(--surface-2);border:1px solid var(--neon-border);border-radius:14px;padding:12px;min-width:205px;}
.poll-q{font-weight:700;font-size:13px;margin-bottom:9px;}
.poll-opt{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:9px;background:rgba(255,255,255,.05);margin-bottom:6px;cursor:pointer;font-size:12px;position:relative;overflow:hidden;transition:background .15s;}
.poll-opt:hover{background:rgba(255,255,255,.09);}
.poll-opt .fillbar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(170,0,255,.35),rgba(99,102,241,.3));z-index:0;transition:width .3s var(--ease);}
.poll-opt span{position:relative;z-index:1;}

.chat-item{display:flex;align-items:center;gap:12px;padding:11px;border-radius:var(--radius-md);cursor:pointer;transition:background .18s,transform .12s;border:1px solid transparent;}
.chat-item:hover{background:var(--neon-soft);border-color:var(--neon-border);transform:translateX(2px);}
.chat-item:active{transform:scale(.985);}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--neon),var(--neon-3));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;overflow:hidden;box-shadow:0 0 0 2px var(--neon-border);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.lg{width:84px;height:84px;font-size:30px;box-shadow:0 0 0 3px var(--neon-border),var(--shadow-neon);}
.chat-info{flex:1;min-width:0;}
.chat-name{font-weight:700;color:var(--text-0);font-size:14px;display:flex;align-items:center;}
.chat-last{font-size:11.5px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

.search-bar{padding:10px 14px 6px;}
.search-bar input{width:100%;padding:12px 16px;border-radius:var(--radius-pill);border:1px solid var(--neon-border);background:var(--surface);color:#fff;font-size:13.5px;outline:none;font-family:inherit;transition:border .18s,box-shadow .18s;}
.search-bar input:focus{border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-soft);}

.form-container{display:flex;flex-direction:column;gap:16px;padding:36px 28px;flex:1;justify-content:center;overflow-y:auto;}
.form-container input,.form-container textarea{padding:13px 16px;border-radius:var(--radius-sm);border:1px solid var(--neon-border);background:var(--surface);color:#fff;font-size:14px;outline:none;font-family:inherit;transition:border .18s,box-shadow .18s;}
.form-container input:focus{border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-soft);}
.btn-primary{background:linear-gradient(135deg,var(--neon),var(--neon-3));color:#fff;border:none;padding:14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;box-shadow:0 8px 22px rgba(170,0,255,.35);letter-spacing:.3px;transition:transform .15s var(--ease),box-shadow .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(170,0,255,.45);}
.btn-primary:active{transform:scale(.98);}
.btn-secondary{background:var(--surface);border:1px solid var(--neon-border);color:var(--text-1);padding:14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:all .15s;}
.btn-secondary:hover{background:var(--neon-soft);color:#fff;}
.btn-danger{background:linear-gradient(135deg,var(--danger),#b91c1c);color:#fff;border:none;padding:11px 16px;border-radius:var(--radius-sm);cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;}

.auth-logo{text-align:center;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.auth-logo h1{font-size:28px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--neon),#c084fc,var(--neon-3));background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 4s linear infinite;}
@keyframes shine{to{background-position:200% center;}}
.auth-logo p{color:var(--text-2);font-size:12px;letter-spacing:.5px;}
.auth-tabs{display:flex;gap:8px;margin-bottom:2px;background:var(--surface);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--neon-border);}
.auth-tabs button{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--text-2);cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;transition:all .2s;}
.auth-tabs button.active{background:linear-gradient(135deg,var(--neon),var(--neon-3));color:#fff;box-shadow:0 4px 14px rgba(170,0,255,.35);}
.link-small{text-align:center;color:var(--text-2);font-size:12px;cursor:pointer;margin-top:6px;}
.link-small:hover{color:var(--neon);}

.settings-card{padding:16px;background:var(--surface);border:1px solid var(--neon-border);border-radius:var(--radius-md);margin:8px 0;}
.settings-card .id-display{font-size:22px;font-weight:800;letter-spacing:3px;color:var(--neon);}
.settings-list-item{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--radius-md);cursor:pointer;transition:background .15s;}
.settings-list-item:hover{background:var(--neon-soft);}

.profile-header{display:flex;flex-direction:column;align-items:center;padding:26px 18px 14px;gap:9px;}
.profile-header .name{font-size:18px;font-weight:800;color:var(--text-0);}
.profile-header .bio{font-size:12.5px;color:var(--text-2);text-align:center;max-width:90%;}
.profile-header .uid-tag{font-size:11px;color:var(--neon);font-weight:700;letter-spacing:1px;}
.streak-pill{background:linear-gradient(135deg,#f97316,var(--gold));color:#1c0a2e;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:var(--radius-pill);margin-top:3px;box-shadow:0 4px 12px rgba(250,204,21,.25);}
.premium-pill{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#1c0a2e;font-size:10px;font-weight:800;padding:3px 9px;border-radius:var(--radius-pill);margin-left:6px;letter-spacing:.3px;}
.stats-row{display:flex;gap:22px;margin-top:6px;}
.stats-row .stat{text-align:center;cursor:pointer;transition:transform .15s;}
.stats-row .stat:hover{transform:translateY(-2px);}
.stats-row .stat b{display:block;font-size:16px;color:var(--text-0);}
.stats-row .stat span{font-size:10.5px;color:var(--text-2);}

.tab-bar{display:flex;border-top:1px solid var(--neon-border);background:rgba(255,255,255,.035);backdrop-filter:blur(18px);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.tab-bar button{flex:1;padding:12px 2px;background:none;border:none;color:var(--text-2);cursor:pointer;font-size:10.5px;font-weight:700;letter-spacing:.3px;font-family:inherit;transition:color .2s;}
.tab-bar button.active-tab{color:var(--neon);border-top:2px solid var(--neon);}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,1,8,.78);backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:200;animation:fadeIn .18s var(--ease);padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:linear-gradient(165deg,var(--bg-2),var(--bg-1));border:1px solid var(--neon-border);padding:22px;border-radius:var(--radius-lg);width:100%;max-width:390px;display:flex;flex-direction:column;gap:11px;box-shadow:0 24px 70px rgba(0,0,0,.55),var(--shadow-neon);max-height:88vh;overflow-y:auto;}
.modal-box h3{color:var(--neon);font-size:15.5px;letter-spacing:.4px;font-weight:800;}
.modal-box input,.modal-box textarea,.modal-box select{padding:11px 14px;border-radius:9px;border:1px solid var(--neon-border);background:var(--surface);color:#fff;outline:none;font-family:inherit;font-size:13.5px;}
.modal-box input:focus,.modal-box textarea:focus{border-color:var(--neon);}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:rgba(22,7,38,.96);border:1px solid var(--neon-border);color:#fff;padding:11px 20px;border-radius:var(--radius-pill);font-size:12.5px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-family:inherit;max-width:85%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);}
.toast.show{opacity:1;}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-2);gap:7px;text-align:center;padding:26px;}
.empty-state b{color:var(--text-1);font-size:13.5px;}
.badge-blocked{background:linear-gradient(135deg,var(--danger),#b91c1c);color:#fff;font-size:9px;padding:2px 7px;border-radius:7px;font-weight:700;margin-left:5px;}
.badge-admin{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#1c0a2e;font-size:9px;padding:2px 7px;border-radius:7px;font-weight:700;margin-left:5px;}
.badge-group{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:9px;padding:2px 7px;border-radius:7px;font-weight:700;margin-left:5px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:5px;box-shadow:0 0 6px var(--ok);}
.spinner{width:28px;height:28px;border:3px solid var(--neon-border);border-top-color:var(--neon);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.back-btn{background:none;border:none;color:var(--neon);font-size:19px;cursor:pointer;padding:4px 8px;font-family:inherit;border-radius:8px;transition:background .15s;}
.back-btn:hover{background:var(--neon-soft);}
.admin-row{display:flex;align-items:center;gap:9px;padding:11px;border-radius:var(--radius-sm);background:var(--surface);margin-bottom:7px;border:1px solid var(--neon-border);flex-wrap:wrap;}
.admin-row .meta{flex:1;min-width:120px;}
.admin-row .meta .nm{font-weight:700;font-size:13px;}
.admin-row .meta .sub{font-size:10.5px;color:var(--text-2);}
.admin-actions{display:flex;gap:6px;flex-wrap:wrap;}
.mini-btn{font-size:10.5px;padding:6px 9px;border-radius:7px;border:1px solid var(--neon-border);background:var(--neon-soft);color:var(--text-1);cursor:pointer;font-weight:700;font-family:inherit;transition:all .15s;}
.mini-btn:hover{background:var(--neon);color:#fff;}
.mini-btn.danger{border-color:rgba(239,68,68,.45);color:#fca5a5;background:rgba(239,68,68,.12);}
.mini-btn.danger:hover{background:var(--danger);color:#fff;}
.mini-btn.ok{border-color:rgba(34,197,94,.45);color:#86efac;background:rgba(34,197,94,.12);}
.mini-btn.ok:hover{background:var(--ok);color:#fff;}
.mini-btn.gold{border-color:rgba(250,204,21,.5);color:#fde68a;background:rgba(250,204,21,.12);}
.follow-btn{padding:7px 18px;border-radius:var(--radius-pill);border:none;font-weight:700;font-size:11.5px;cursor:pointer;font-family:inherit;transition:transform .15s;}
.follow-btn:hover{transform:translateY(-1px);}
.follow-btn.follow{background:linear-gradient(135deg,var(--neon),var(--neon-3));color:#fff;box-shadow:0 4px 14px rgba(170,0,255,.3);}
.follow-btn.unfollow{background:var(--surface);color:var(--text-1);border:1px solid var(--neon-border);}
hr.sep{border:none;border-top:1px solid var(--neon-border);margin:6px 0;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-sm);background:var(--surface);margin-bottom:6px;border:1px solid transparent;transition:border .15s;}
.lb-row:hover{border-color:var(--neon-border);}
.lb-rank{width:26px;text-align:center;font-weight:800;color:var(--gold);}
.action-sheet{display:flex;flex-direction:column;gap:5px;}
.action-sheet button{text-align:left;background:var(--surface);border:1px solid var(--neon-border);color:var(--text-0);padding:12px 15px;border-radius:var(--radius-sm);font-size:13.5px;font-family:inherit;cursor:pointer;transition:background .15s;}
.action-sheet button:hover{background:var(--neon-soft);}
.action-sheet button.danger{color:#fca5a5;}
.captcha-box{display:flex;align-items:center;gap:10px;background:var(--neon-soft);border:1px dashed var(--neon-border);border-radius:var(--radius-sm);padding:11px;}
.captcha-box .q{font-size:18px;font-weight:800;color:var(--neon);letter-spacing:1px;}
.member-row{display:flex;align-items:center;gap:9px;padding:9px;border-radius:var(--radius-sm);background:var(--surface);margin-bottom:5px;}
.member-row .meta{flex:1;font-size:12px;}
.fav-star{font-size:15px;cursor:pointer;transition:transform .15s;}
.fav-star:hover{transform:scale(1.2);}
.icon-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--neon-soft);border:1px solid var(--neon-border);font-size:15px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay hidden" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJsf_lN3LHXTguUluQT-DA3TbWnStMwRI",
  authDomain: "ness-2236c.firebaseapp.com",
  projectId: "ness-2236c",
  storageBucket: "ness-2236c.firebasestorage.app",
  messagingSenderId: "139188874419",
  appId: "1:139188874419:web:bf9150717ac9eee2d154c6",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

const ADMIN_USERNAME="RezzX";
const ADMIN_DEFAULT_PASSWORD="123";

let currentUser=null;

function generateUserId(){return String(Math.floor(100000+Math.random()*900000));}
async function hashPassword(pw){
const encoder=new TextEncoder();
const data=encoder.encode(pw);
const hashBuffer=await crypto.subtle.digest('SHA-256',data);
const hashArray=Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getChatId(uid1,uid2){return uid1<uid2?uid1+'_'+uid2:uid2+'_'+uid1;}
function escapeHtml(str){
const d=document.createElement('div');
d.textContent=str;
return d.innerHTML;
}
function avatarHtml(user,size){
const cls=size==='lg'?'avatar lg':'avatar';
if(user&&user.photo)return `<div class="${cls}"><img src="${user.photo}"></div>`;
const initial=user&&user.name?user.name.charAt(0).toUpperCase():'?';
return `<div class="${cls}">${initial}</div>`;
}
function compressImage(file,maxSize,quality){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=(e)=>{
const img=new Image();
img.onload=()=>{
let w=img.width,h=img.height;
if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}}
else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}}
const canvas=document.createElement('canvas');
canvas.width=w;canvas.height=h;
canvas.getContext('2d').drawImage(img,0,0,w,h);
resolve(canvas.toDataURL('image/jpeg',quality));
};
img.onerror=reject;
img.src=e.target.result;
};
reader.onerror=reject;
reader.readAsDataURL(file);
});
}
function blobToBase64(blob){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(blob);
});
}
function unsubscribeMessages(){if(messagesUnsub){messagesUnsub();messagesUnsub=null;}}
function unsubscribeAll(){unsubscribeMessages();unsubscribers.forEach(fn=>fn());unsubscribers=[];}

function renderApp(){

async function handleLogin(){
const name=document.getElementById('authName').value.trim();
const password=document.getElementById('authPassword').value;
if(!name||!password){showToast('Lengkapi semua field');return;}
try{
await ensureAuthReady();
const snap=await db.collection('users').where('name','==',name).limit(1).get();
if(snap.empty){showToast('Akun tidak ditemukan');return;}
const doc=snap.docs[0];
const data=doc.data();
if(data.accountBlocked){showToast('Akun anda diblokir oleh admin');return;}
const hashed=await hashPassword(password);
if(data.password!==hashed){showToast('Password salah');return;}
await doc.ref.update({authUid:auth.currentUser.uid});
currentUser={...data,uid:doc.id,authUid:auth.currentUser.uid,_rawPassword:password,isAdmin:!!data.isAdminAccount};
localStorage.setItem('skytalk_user',JSON.stringify({uid:doc.id,password:password}));
renderApp();
updateOnlineStatus(true);
}catch(err){
console.error(err);
showToast('Gagal terhubung ke server, coba lagi');
}
}

async function handleRegister(captcha){
const name=document.getElementById('authName').value.trim();
const bio=document.getElementById('authBio').value.trim();
const password=document.getElementById('authPassword').value;
const password2=document.getElementById('authPassword2').value;
const captchaVal=parseInt(document.getElementById('captchaInput').value);
if(captchaVal!==captcha.answer){showToast('Verifikasi salah, coba lagi');document.getElementById('tabRegister').click();return;}
if(!name||!password){showToast('Lengkapi semua field');return;}
if(name.length<3){showToast('Username minimal 3 karakter');return;}
if(password.length<4){showToast('Password minimal 4 karakter');return;}
if(password!==password2){showToast('Password tidak sama');return;}
if(name.toLowerCase()===ADMIN_USERNAME.toLowerCase()){showToast('Username tidak tersedia');return;}
try{
await ensureAuthReady();
const existing=await db.collection('users').where('name','==',name).limit(1).get();
if(!existing.empty){showToast('Username sudah dipakai');return;}
let userId=generateUserId();

while(!idCheck.empty){userId=generateUserId();idCheck=await db.collection('users').where('id','==',userId).limit(1).get();}
const hashed=await hashPassword(password);
await db.collection('users').add({
id:userId,name:name,bio:bio||'Hai, saya pengguna baru SkyTalk!',photo:null,password:hashed,
following:[],followers:[],favorites:[],blockedUsers:[],accountBlocked:false,online:false,

});

document.getElementById('tabLogin').click();
document.getElementById('authName').value=name;
}catch(err){
console.error(err);
showToast('Gagal mendaftar, coba lagi');
}
}

async function performSearch(val){
const results=document.getElementById('searchResults');
if(!results)return;
if(!val){results.innerHTML=`<div class="empty-state"><b>Cari pengguna</b><span>Ketik ID atau username</span></div>`;return;}
results.innerHTML=`<div style="display:flex;justify-content:center;padding:18px;"><div class="spinner"></div></div>`;
try{
const byId=await db.collection('users').where('id','==',val).limit(5).get();
const byName=await db.collection('users').where('name','>=',val).where('name','<=',val+'\uf8ff').limit(15).get();
const map=new Map();
// Key = Firestore doc ID; store _docId separately for unambiguous doc references
byId.forEach(doc=>map.set(doc.id,{_docId:doc.id,...doc.data()}));
byName.forEach(doc=>map.set(doc.id,{_docId:doc.id,...doc.data()}));
map.delete(currentUser.uid);
if(map.size===0){results.innerHTML=`<div class="empty-state"><b>Tidak ditemukan</b></div>`;return;}
let html='';
map.forEach((u)=>{
// data-uid always holds the Firestore document ID (_docId)
html+=`<div class="chat-item" data-uid="${u._docId}">${avatarHtml(u)}
<div class="chat-info"><div class="chat-name">${u.name}${u.isAdminAccount?'<span class="badge-admin">ADMIN</span>':''}${u.accountBlocked?'<span class="badge-blocked">Blokir</span>':''}</div>
<div class="chat-last">ID: ${u.id}</div></div></div>`;
});
results.innerHTML=html;
results.querySelectorAll('.chat-item').forEach(item=>item.addEventListener('click',()=>renderProfileTab(item.dataset.uid,true)));
}catch(err){
console.error(err);
results.innerHTML=`<div class="empty-state"><b>Gagal mencari</b><span>Periksa koneksi atau coba lagi</span></div>`;
}
}

async function toggleFavorite(uid,isFav){
const ref=db.collection('users').doc(currentUser.uid);
if(isFav){
await ref.update({favorites:firebase.firestore.FieldValue.arrayRemove(uid)});
currentUser.favorites=(currentUser.favorites||[]).filter(x=>x!==uid);
showToast('Dihapus dari favorit');
}else{
await ref.update({favorites:firebase.firestore.FieldValue.arrayUnion(uid)});
currentUser.favorites=[...(currentUser.favorites||[]),uid];
showToast('Ditambahkan ke favorit');
}
renderProfileTab(uid,true);
}
async function toggleBlockUser(uid,isBlocked){
const ref=db.collection('users').doc(currentUser.uid);
if(isBlocked){
await ref.update({blockedUsers:firebase.firestore.FieldValue.arrayRemove(uid)});
currentUser.blockedUsers=(currentUser.blockedUsers||[]).filter(x=>x!==uid);
showToast('Blokir dibuka');
}else{
await ref.update({blockedUsers:firebase.firestore.FieldValue.arrayUnion(uid)});
currentUser.blockedUsers=[...(currentUser.blockedUsers||[]),uid];
showToast('Pengguna diblokir');
}
renderProfileTab(uid,true);
}
async function toggleFollow(targetUid,isFollowing){
const myRef=db.collection('users').doc(currentUser.uid);
const targetRef=db.collection('users').doc(targetUid);
if(isFollowing){

function chatContextRef(){
if(currentGroup)return db.collection('groups').doc(currentGroup.id);

function listenToMessages(){
unsubscribeMessages();
const ref=chatContextRef();
const container=document.getElementById('messagesContainer');
messagesUnsub=ref.collection('messages').orderBy('timestamp','asc').limit(300)
.onSnapshot((snapshot)=>{
if(!container)return;
activeMessages=[];
snapshot.forEach(doc=>activeMessages.push({id:doc.id,...doc.data()}));
const now=Date.now();
activeMessages=activeMessages.filter(m=>!(m.expireAt&&m.expireAt<now)&&!(m.deletedFor&&m.deletedFor.includes(currentUser.uid)));
renderPinBar();
container.innerHTML='';
activeMessages.forEach(msg=>renderMessage(msg,container));
container.scrollTop=container.scrollHeight;
markMessagesRead(snapshot);
},err=>{console.error(err);showToast('Gagal memuat pesan: izin ditolak');});
}
function markMessagesRead(snapshot){
snapshot.forEach(doc=>{
const m=doc.data();
if(m.senderUid!==currentUser.uid&&(!m.seenBy||!m.seenBy.includes(currentUser.uid))){
doc.ref.update({seenBy:firebase.firestore.FieldValue.arrayUnion(currentUser.uid),status:'read'}).catch(()=>{});
}
});
}
function renderPinBar(){
const wrap=document.getElementById('pinBarWrap');
if(!wrap)return;
const pinned=activeMessages.find(m=>m.pinned);
if(!pinned){wrap.innerHTML='';return;}
const preview=pinned.type==='text'?pinned.text:(pinned.type==='image'?'📷 Gambar':(pinned.type==='audio'?'🎤 Voice Note':'📊 Polling'));
wrap.innerHTML=`<div class="pin-bar">📌 <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(preview)}</span><button class="mini-btn" id="btnUnpin">Lepas</button></div>`;
document.getElementById('btnUnpin').addEventListener('click',()=>togglePin(pinned.id,true));
}
function renderMessage(msg,container){
if(msg.type==='system'){
const sd=document.createElement('div');
sd.style.textAlign='center';sd.style.fontSize='11px';sd.style.color='var(--text-2)';sd.style.margin='4px 0';
sd.textContent=msg.text;
container.appendChild(sd);
return;
}
const wrapDiv=document.createElement('div');
const isSent=msg.senderUid===currentUser.uid;
wrapDiv.className='message-wrap '+(isSent?'sent-wrap':'received-wrap');
let senderTagEl=null;
if(currentGroup&&!isSent){
const member=currentGroup._memberMap&&currentGroup._memberMap[msg.senderUid];
senderTagEl=document.createElement('div');
senderTagEl.className='sender-tag';
senderTagEl.textContent=member?member.name:'...';
}
const div=document.createElement('div');
div.className='message '+(isSent?'sent':'received');
div.dataset.mid=msg.id;
let content='';
if(msg.pinned)content+='<div class="pinned-flag">📌 Disematkan</div>';
if(msg.replySnippet)content+=`<div class="quote">${escapeHtml(msg.replySnippet)}</div>`;
if(msg.type==='text')content+=escapeHtml(msg.text);
else if(msg.type==='image')content+=`<img src="${msg.data}" loading="lazy" onclick="window.open(this.src)">`;
else if(msg.type==='audio')content+=`<audio src="${msg.data}" controls></audio>`;
else if(msg.type==='poll')content+=renderPollHtml(msg);
const time=msg.timestamp?new Date(msg.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
let tick='';
if(isSent&&!currentGroup){
const seen=msg.seenBy&&msg.seenBy.includes(currentChatUser.uid);
tick=`<span class="tick ${seen?'read':''}">${seen?'✓✓':'✓'}</span>`;
}
div.innerHTML=content+`<div class="message-time">${time}${tick}</div>`;
div.addEventListener('click',()=>{
if(msg.type==='poll')return;
openMessageActionSheet(msg);
});
if(msg.type==='poll'){
div.querySelectorAll('.poll-opt').forEach((opt,idx)=>opt.addEventListener('click',()=>votePoll(msg,idx)));
}
if(senderTagEl)wrapDiv.appendChild(senderTagEl);
wrapDiv.appendChild(div);
container.appendChild(wrapDiv);
}
function renderPollHtml(msg){
const votes=msg.votes||{};
const total=Object.keys(votes).length;
const counts=msg.options.map((_,i)=>Object.values(votes).filter(v=>v===i).length);
let html=`<div class="poll-box"><div class="poll-q">📊 ${escapeHtml(msg.question)}</div>`;
msg.options.forEach((opt,i)=>{
const pct=total>0?Math.round((counts[i]/total)*100):0;
html+=`<div class="poll-opt"><div class="fillbar" style="width:${pct}%;"></div><span>${escapeHtml(opt)}</span><span>${counts[i]} (${pct}%)</span></div>`;
});
html+=`</div>`;
return html;
}

async function sendTextMessage(){
const input=document.getElementById('messageInput');
const text=input.value.trim();
if(!text)return;
if(currentGroup){
if(currentGroup.onlyAdminSend&&!(currentGroup.admins||[]).includes(currentUser.uid)&&!currentUser.isAdmin){showToast('Hanya admin grup yang dapat mengirim pesan');return;}
}else{
if((currentChatUser.blockedUsers||[]).includes(currentUser.uid)){showToast('Anda diblokir oleh pengguna ini');return;}
}
const ref=chatContextRef();
const payload={type:'text',text:text,senderUid:currentUser.uid,status:'sent',seenBy:[],timestamp:firebase.firestore.FieldValue.serverTimestamp()};
if(replyTarget){
const preview=replyTarget.type==='text'?replyTarget.text:(replyTarget.type==='image'?'📷 Gambar':(replyTarget.type==='audio'?'🎤 Voice Note':'📊 Polling'));
payload.replySnippet=preview;
}
if(!currentGroup&&currentUser.disappearTimer)payload.expireAt=Date.now()+currentUser.disappearTimer*1000;
await ref.collection('messages').add(payload);
const metaUpdate={lastMessage:text,lastSender:currentUser.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
if(!currentGroup)metaUpdate.participants=[currentUser.uid,currentChatUser.uid];
await ref.set(metaUpdate,{merge:true});
input.value='';
replyTarget=null;
const rb=document.getElementById('replyBarWrap');

updateStreak(currentGroup?currentGroup.id:null);

if(base64.length>900000){showToast('Gambar terlalu besar');e.target.value='';return;}
const ref=chatContextRef();

const metaUpdate={lastMessage:'📷 Gambar',lastSender:currentUser.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};

}catch(err){showToast('Gagal mengirim gambar');}

async function toggleRecording(){
const btn=document.getElementById('btnRecord');
if(!isRecording){
try{
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream);
audioChunks=[];
mediaRecorder.ondataavailable=(e)=>audioChunks.push(e.data);
mediaRecorder.onstop=async()=>{
const blob=new Blob(audioChunks,{type:'audio/webm'});
await uploadVoiceNote(blob);
stream.getTracks().forEach(t=>t.stop());
};
mediaRecorder.start();
isRecording=true;btn.classList.add('recording');btn.textContent='⏹';
}catch{showToast('Mikrofon tidak tersedia');}
}else{
mediaRecorder.stop();isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';
}
}
async function uploadVoiceNote(blob){
if(blob.size>900000){showToast('Voice note terlalu panjang');return;}
showToast('Mengirim voice note...');
try{
const base64=await blobToBase64(blob);
const ref=chatContextRef();
await ref.collection('messages').add({type:'audio',data:base64,senderUid:currentUser.uid,status:'sent',seenBy:[],timestamp:firebase.firestore.FieldValue.serverTimestamp()});
const metaUpdate={lastMessage:'🎤 Voice Note',lastSender:currentUser.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
if(!currentGroup)metaUpdate.participants=[currentUser.uid,currentChatUser.uid];
await ref.set(metaUpdate,{merge:true});
updateStreak(currentGroup?currentGroup.id:null);
}catch{showToast('Gagal mengirim voice note');}
}
async function updateStreak(groupId){
const today=new Date().toDateString();
if(groupId){
const gref=db.collection('groups').doc(groupId);
const gsnap=await gref.get();
const gdata=gsnap.data();
if(gdata.lastStreakDate!==today){
const yesterday=new Date(Date.now()-86400000).toDateString();
const newStreak=gdata.lastStreakDate===yesterday?(gdata.streak||0)+1:1;
await gref.update({streak:newStreak,lastStreakDate:today});
}
return;
}
const ref=db.collection('users').doc(currentUser.uid);
const snap=await ref.get();
const data=snap.data();
if(data.lastStreakDate!==today){
const yesterday=new Date(Date.now()-86400000).toDateString();
const newStreak=data.lastStreakDate===yesterday?(data.streak||0)+1:1;
await ref.update({streak:newStreak,lastStreakDate:today});
currentUser.streak=newStreak;
currentUser.lastStreakDate=today;
}
}

/* ===================== GROUP CHAT ===================== */
async function openGroup(gid){
const snap=await db.collection('groups').doc(gid).get();
if(!snap.exists)return;
const data=snap.data();
const memberDocs=await Promise.all(data.members.map(m=>db.collection('users').doc(m).get()));
const memberMap={};
memberDocs.forEach(d=>{if(d.exists)memberMap[d.id]={uid:d.id,...d.data()};});
currentGroup={id:gid,...data,_memberMap:memberMap};
currentChatUser=null;
replyTarget=null;
renderGroupScreen();
}

async function openAddMemberModal(){
const snap=await db.collection('users').doc(currentUser.uid).get();
const data=snap.data();
const candidateUids=Array.from(new Set([...(data.following||[]),...(data.followers||[])])).filter(u=>!currentGroup.members.includes(u));
const docs=await Promise.all(candidateUids.map(u=>db.collection('users').doc(u).get()));
let html='';
docs.forEach(d=>{
if(!d.exists)return;
const u=d.data();
html+=`<label class="member-row"><input type="checkbox" class="addMCheck" value="${d.id}"> ${avatarHtml(u)} <span class="meta">${u.name}</span></label>`;
});
openModal(`<h3>Tambah Anggota</h3><div style="max-height:240px;overflow-y:auto;">${html||'<p style="font-size:12px;color:var(--text-2);">Tidak ada kandidat tersedia</p>'}</div><button class="btn-primary" id="btnAddMembers">Tambah</button><button class="btn-secondary" id="btnCancelAddM">Batal</button>`);
document.getElementById('btnCancelAddM').addEventListener('click',closeModal);
document.getElementById('btnAddMembers').addEventListener('click',async()=>{
const selected=Array.from(document.querySelectorAll('.addMCheck:checked')).map(c=>c.value);
if(selected.length===0){closeModal();return;}
await db.collection('groups').doc(currentGroup.id).update({members:firebase.firestore.FieldValue.arrayUnion(...selected)});
closeModal();
showToast('Anggota berhasil ditambahkan');
openGroup(currentGroup.id);
});
}

/* ===================== ADMIN PANEL ===================== */
function renderAdminPanel(){
const app=document.getElementById('app');
app.innerHTML=`
<div class="screen active" id="adminScreen">
<div class="header">
<button class="back-btn" id="btnBackAdmin">&larr;</button>
<div class="brand">${LOGO(24)}<span class="brand-word">👑 ADMIN</span></div>
<div></div>
</div>
<div class="search-bar"><input type="text" id="adminSearchInput" placeholder="Cari ID atau username..."></div>
<div class="content" id="adminContent"></div>
</div>`;
document.getElementById('btnBackAdmin').addEventListener('click',()=>renderApp());
document.getElementById('adminSearchInput').addEventListener('input',(e)=>loadAdminUsers(e.target.value.trim()));
loadAdminUsers('');
}
async function loadAdminUsers(query){
const content=document.getElementById('adminContent');
content.innerHTML=`<div style="display:flex;justify-content:center;padding:28px;"><div class="spinner"></div></div>`;
try{
if(query){
const byId=await db.collection('users').where('id','==',query).limit(10).get();
const byName=await db.collection('users').where('name','>=',query).where('name','<=',query+'\uf8ff').limit(20).get();
const map=new Map();
byId.forEach(d=>map.set(d.id,{_docId:d.id,...d.data()}));
byName.forEach(d=>map.set(d.id,{_docId:d.id,...d.data()}));
renderAdminList(Array.from(map.values()));
return;
}
const snap=await db.collection('users').orderBy('createdAt','desc').limit(50).get();
const list=[];
snap.forEach(doc=>list.push({_docId:doc.id,...doc.data()}));
renderAdminList(list);
}catch(err){
console.error(err);
content.innerHTML=`<div class="empty-state"><b>Gagal memuat data</b></div>`;
}
}
function renderAdminList(list){
const content=document.getElementById('adminContent');
if(list.length===0){content.innerHTML=`<div class="empty-state"><b>Tidak ada pengguna</b></div>`;return;}
let html='';
list.forEach(u=>{
html+=`<div class="admin-row" data-uid="${u._docId}">
${avatarHtml(u)}
<div class="meta"><div class="nm">${u.name}${u.isAdminAccount?'<span class="badge-admin">ADMIN</span>':''}${u.accountBlocked?'<span class="badge-blocked">Blokir</span>':''}</div>
<div class="sub">ID: ${u.id} • 🔥${u.streak||0} • Pengikut:${(u.followers||[]).length} • Mengikuti:${(u.following||[]).length}</div></div>
<div class="admin-actions">
<button class="mini-btn" data-action="edit">Edit</button>
${!u.isAdminAccount?`<button class="mini-btn ${u.accountBlocked?'ok':'danger'}" data-action="toggleblock">${u.accountBlocked?'Unblock':'Block'}</button>`:''}
</div></div>`;
});
content.innerHTML=html;
content.querySelectorAll('.admin-row').forEach(row=>{
const docId=row.dataset.uid;
const user=list.find(u=>u._docId===docId);
row.querySelector('[data-action="edit"]').addEventListener('click',()=>openAdminEditUserModal(user));
const blockBtn=row.querySelector('[data-action="toggleblock"]');
if(blockBtn)blockBtn.addEventListener('click',async()=>{
await db.collection('users').doc(docId).update({accountBlocked:!user.accountBlocked});
showToast(user.accountBlocked?'Pengguna di-unblock':'Pengguna diblokir');
loadAdminUsers(document.getElementById('adminSearchInput').value.trim());
});
});
}
function openAdminEditUserModal(user){
openModal(`
<h3>Kontrol Penuh: ${user.name}</h3>
<input type="text" id="adEditId" placeholder="ID" value="${user.id}">
<input type="text" id="adEditName" placeholder="Username" value="${user.name}">
<textarea id="adEditBio" rows="2" placeholder="Bio">${user.bio||''}</textarea>
<input type="number" id="adEditStreak" placeholder="Streak (hari)" value="${user.streak||0}">
<input type="number" id="adEditFollowers" placeholder="Jumlah Pengikut (manual)" value="${(user.followers||[]).length}">
<input type="number" id="adEditFollowing" placeholder="Jumlah Mengikuti (manual)" value="${(user.following||[]).length}">
<input type="password" id="adEditPassword" placeholder="Ganti Password (kosongkan jika tidak)">
<button class="btn-primary" id="btnAdSave">SIMPAN SEMUA</button>
${!user.isAdminAccount?'<button class="btn-danger" id="btnAdDelete">Hapus Akun Permanen</button>':''}
<button class="btn-secondary" id="btnAdCancel">Tutup</button>`);
document.getElementById('btnAdCancel').addEventListener('click',closeModal);
document.getElementById('btnAdSave').addEventListener('click',async()=>{
const newId=document.getElementById('adEditId').value.trim();
const newName=document.getElementById('adEditName').value.trim();
const newBio=document.getElementById('adEditBio').value.trim();
const newStreak=parseInt(document.getElementById('adEditStreak').value)||0;
const newFollowersCount=parseInt(document.getElementById('adEditFollowers').value)||0;
const newFollowingCount=parseInt(document.getElementById('adEditFollowing').value)||0;
const newPassword=document.getElementById('adEditPassword').value;
const update={id:newId,name:newName,bio:newBio,streak:newStreak};
const currentFollowers=user.followers||[];
const currentFollowing=user.following||[];
if(newFollowersCount!==currentFollowers.length){
const fake=[];for(let i=0;i<newFollowersCount;i++)fake.push('admin_set_'+i);
update.followers=fake;
}
if(newFollowingCount!==currentFollowing.length){
const fake=[];for(let i=0;i<newFollowingCount;i++)fake.push('admin_set_'+i);
update.following=fake;
}
if(newPassword)update.password=await hashPassword(newPassword);
await db.collection('users').doc(user._docId).update(update);
closeModal();
showToast('Data pengguna berhasil diperbarui');
loadAdminUsers(document.getElementById('adminSearchInput').value.trim());
});
const delBtn=document.getElementById('btnAdDelete');
if(delBtn)delBtn.addEventListener('click',async()=>{
if(!confirm('Hapus akun ini secara permanen?'))return;
await db.collection('users').doc(user._docId).delete();
closeModal();
showToast('Akun berhasil dihapus');
loadAdminUsers('');
});
}

/* ===================== ONLINE / BOOTSTRAP ===================== */
function updateOnlineStatus(online){
if(!currentUser)return;
db.collection('users').doc(currentUser.uid).update({online:online,lastActive:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
}
window.addEventListener('beforeunload',()=>updateOnlineStatus(false));

async function bootstrap(){
const app=document.getElementById('app');
app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;">${LOGO(50)}<div class="spinner"></div></div>`;
try{
await ensureAuthReady();
await ensureAdminAccountExists();
}catch(err){
console.error(err);
}
const savedUser=localStorage.getItem('skytalk_user');
if(savedUser){
try{
const parsed=JSON.parse(savedUser);
const doc=await db.collection('users').doc(parsed.uid).get();
if(doc.exists){
const data=doc.data();
const hashed=await hashPassword(parsed.password);
if(data.password===hashed&&!data.accountBlocked){
if(auth.currentUser){
await doc.ref.update({authUid:auth.currentUser.uid});
}
currentUser={...data,uid:doc.id,authUid:auth.currentUser?auth.currentUser.uid:data.authUid,_rawPassword:parsed.password,isAdmin:!!data.isAdminAccount};
renderApp();
updateOnlineStatus(true);
return;
}
}
}catch(err){console.error(err);}
localStorage.removeItem('skytalk_user');
}
renderApp();
}
window.addEventListener('load',bootstrap);
document.addEventListener('visibilitychange',()=>{
if(currentUser)updateOnlineStatus(!document.hidden);
});
</script>
